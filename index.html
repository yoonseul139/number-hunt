<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      #container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: antiquewhite;
        text-align: center;
      }

      .title {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .clip {
        width: 150px;
        height: 150px;
        overflow: hidden; /* 이미지가 영역 밖으로 안 나가게 */
        clip-path: circle(50% at 50% 50%);
      }

      .clip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .title h3 {
        font-size: 50px;
        -webkit-text-stroke: 1px orangered; /*글자테두리 생김*/
        color: transparent; /*글자 면 색상 빠짐*/
      }

      .imgBox {
        width: 1100px;
        margin: 80px 0px;
        border-radius: 15px;
      }
      .imgBox img {
        width: 50%;
        border-radius: 15px;
      }
      .box {
        width: 1100px;
        margin: 0px auto;
        font-size: 17px;
      }
      #user {
        width: 250px;
        padding: 10px;
      }
      #chance {
        margin: 15px 0px;
        font-size: 25px;
      }
      #result {
        font-size: 25px;
      }
      #play,
      #reset {
        margin-left: 10px;
        padding: 10px;
        border: none;
        background-color: rgb(219, 148, 148);
      }
      #play:hover {
        background-color: brown;
        color: antiquewhite;
      }
      #reset:hover {
        background-color: brown;
        color: antiquewhite;
      }

      /* 반응 애니메이션 */
      .imgBox img {
        transition: transform 0.4s ease;
      }

      /* UP: 톡 위로 튀기 */
      .upAnim {
        transform: translateY(-20px) scale(1.05);
      }

      /* DOWN: 아래로 꾹 눌리는 느낌 */
      .downAnim {
        transform: translateY(20px) scale(0.95);
      }

      /* BINGO: 축하 팡팡! */
      .bingoAnim {
        animation: bingoEffect 0.6s ease forwards;
      }

      @keyframes bingoEffect {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.2);
        }
        60% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1.15);
        }
      }

      /* 텍스트 팝업 */
      #result.popup {
        animation: popupText 0.6s ease;
      }

      @keyframes popupText {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="all">
        <div class="title">
          <div class="clip">
            <img src="img/up_and_down.jpg" alt="" />
          </div>
          <h3>
            Number Hunt :<br />
            5 Chances
          </h3>
        </div>
        <div class="imgBox">
          <img src="img/game1.png" alt="" />
        </div>
        <div class="box">
          <div id="result">결과화면 : up/down/bingo</div>
          <div id="chance">남은찬스 : 5번</div>
          <input
            id="user"
            placeholder="1부터 100까지의 수"
            onkeypress="if(event.keyCode==13){play()}"
          />
          <!-- 만약 키를 눌렀을 때 13번키(엔터)와 같다면 play함수를 호출하시오 -->
          <button id="play">시작</button>
          <button id="reset">재시작</button>
        </div>
        <script src="custom.js"></script>
      </div>
    </div>
  </body>
</html>
